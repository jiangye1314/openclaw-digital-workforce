version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-claw-backend
    ports:
      - "3001:3001"
    restart: always
    volumes:
      - ./backend/data:/app/backend/data
    networks:
      - social-claw-network

  nginx:
    image: nginx:alpine
    container_name: social-claw-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: always
    networks:
      - social-claw-network

networks:
  social-claw-network:
    driver: bridge
